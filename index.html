<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI | Sovereign Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Map Container */
        #map { position: absolute; top: 60px; bottom: 46px; left: 0; right: 0; z-index: 10; background: #000; cursor: crosshair; }
        
        /* Unified HUD Header */
        #hud-header { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #000; z-index: 5005; border-bottom: 1px solid #333; }
        #threat-ticker { height: 25px; background: #111; display: flex; align-items: center; font-size: 10px; font-weight: bold; overflow: hidden; border-bottom: 1px solid #222; }
        .threat-level-bar { height: 100%; background: #ef4444; transition: width 2s ease-in-out; }
        #news-bulletin-wrap { height: 35px; background: #ef4444; color: #000; display: flex; align-items: center; overflow: hidden; font-weight: 900; font-size: 11px; }

        /* Counter Styling (Top Right) */
        #user-counter { position: fixed; top: 12px; right: 15px; z-index: 6000; background: rgba(0,0,0,0.8); border: 1px solid #ef4444; padding: 4px 10px; border-radius: 4px; font-family: monospace; font-size: 11px; color: #ef4444; font-weight: bold; pointer-events: none; }
        .pulse-dot { display: inline-block; width: 6px; height: 6px; background: #ef4444; border-radius: 50%; margin-right: 5px; animation: pulse 1s infinite; }

        /* Popup Content */
        .leaflet-popup-content-wrapper { background: #0a0a0a; color: white; border: 1px solid #ef4444; border-radius: 0; padding: 2px; }
        .leaflet-popup-tip { background: #ef4444; }
        .intel-select { background: #1a1a1a; color: #ef4444; border: 1px solid #ef4444; width: 100%; padding: 8px; margin-top: 10px; font-weight: bold; font-size: 11px; cursor: pointer; outline: none; }
        .intel-btn { background: #ef4444; color: #000; width: 100%; padding: 8px; margin-top: 10px; font-weight: 900; font-size: 10px; text-transform: uppercase; cursor: pointer; border: none; text-align: center; }
        .intel-input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 8px; font-size: 10px; margin-top: 5px; outline: none; }

        /* News Animation */
        .news-ticker-move { white-space: nowrap; animation: ticker-news 100s linear infinite; display: flex; }
        @keyframes ticker-news { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #ticker-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 46px; background: #000; border-top: 1px solid #ef4444; z-index: 5000; }
    </style>
</head>
<body>

    <div id="user-counter">
        <span class="pulse-dot"></span>ACTIVE OPS: <span id="count-val">4052</span>
    </div>

    <header id="hud-header">
        <div id="threat-ticker">
            <div id="threat-bar" class="threat-level-bar" style="width: 88%;"></div>
            <div id="threat-text" style="position:absolute; width:100%; text-align:center; text-shadow: 1px 1px black; color: white;">MARCH 15, 2026: OPERATION ROARING LION - RISK LEVEL: 88%</div>
        </div>
        <div id="news-bulletin-wrap">
            <div style="background:#000; color:#ef4444; padding:0 15px; height:100%; display:flex; align-items:center; border-right:1px solid white; z-index:2;">FLASH</div>
            <div class="news-ticker-move" id="live-news-ticker">PENDING DATA...</div>
        </div>
    </header>

    <div id="map"></div>

    <div id="ticker-container">
        <div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div>
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {"symbols": [{"proName": "OANDA:XAUUSD", "title": "GOLD"},{"proName": "FX_IDC:USDILS", "title": "USD/ILS"},{"proName": "BITSTAMP:BTCUSD", "title": "BTC"}],"colorTheme": "dark","isTransparent": true,"displayMode": "adaptive","locale": "en"}
        </script></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1482741387534274581/_28vC-BnDqL8_AFeGLnUaAGZ8brAgVyjJQuvF5oNXJvp66CCSdI-B2CKVlY1BeG82tlh";
        
        const map = L.map('map', { zoomControl: false, attributionControl: false, tap: false }).setView([31.7, 35.2], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Dynamic User Counter
        setInterval(() => {
            const current = parseInt(document.getElementById('count-val').innerText);
            const drift = Math.floor(Math.random() * 8) * (Math.random() > 0.5 ? 1 : -1);
            document.getElementById('count-val').innerText = Math.max(4001, current + drift);
        }, 4000);

        // Live News Feed (Updated for March 15, 2026 Context)
        async function fetchLiveIntel() {
            const news = [
                "IDF CONFIRMS OPERATION ROARING LION ACTIVE IN IRAN SECTOR",
                "MISSILE IMPACT REPORTED IN CENTRAL ISRAEL",
                "TRUMP SUGGESTS ADDITIONAL STRIKES ON IRAN OIL HUBS",
                "SYRIAN MINORITIES FACE KIDNAPPING RISKS AMID REGIONAL CHAOS",
                "US AIR FORCE B-52 BOMBERS DEPLOYED IN OPERATION EPIC FURY",
                "IDF DESTROYS 90% OF HEZBOLLAH PRE-2023 ARSENAL"
            ];
            const tickerHtml = news.map(msg => `<span style="margin-right:80px;">[ INTEL: ${msg} ]</span>`).join('');
            document.getElementById('live-news-ticker').innerHTML = tickerHtml + tickerHtml;
        }
        fetchLiveIntel();

        // Map Click Handler
        map.on('click', async function(e) {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
            const data = await res.json();
            const addr = data.address;
            
            const city = addr.city || addr.town || addr.village || addr.suburb || "LOCAL SECTOR";
            const state = addr.state || addr.province || addr.country || "GLOBAL REGION";
            const threat = Math.floor(Math.random() * 30) + 65; // High alert base (65-95%)

            const popupBody = `
                <div style="min-width:180px;">
                    <b style="color:#ef4444; font-size:14px;">${city.toUpperCase()}</b><br>
                    <span style="font-size:10px; color:#888;">${state.toUpperCase()}</span>
                    <hr style="border:0; border-top:1px solid #333; margin:8px 0;">
                    
                    <select class="intel-select" id="intel-mode" onchange="switchIntel('${city}', '${state}', ${threat}, ${e.latlng.lat}, ${e.latlng.lng})">
                        <option value="news">📰 NEWS INTEL</option>
                        <option value="threat">☢️ SECTOR RISK: ${threat}%</option>
                        <option value="report">📡 TRANSMIT INTEL</option>
                    </select>

                    <div id="intel-display" style="margin-top:10px;">
                        <a href="https://www.google.com/search?q=${city}+${state}+breaking+news&tbm=nws" target="_blank" class="intel-btn" style="display:block;">FETCH 10 LIVE FEEDS</a>
                    </div>
                </div>
            `;
            L.popup().setLatLng(e.latlng).setContent(popupBody).openOn(map);
        });

        function switchIntel(city, state, threat, lat, lon) {
            const mode = document.getElementById('intel-mode').value;
            const display = document.getElementById('intel-display');
            
            if (mode === 'news') {
                display.innerHTML = `<a href="https://www.google.com/search?q=${city}+${state}+breaking+news&tbm=nws" target="_blank" class="intel-btn" style="display:block;">FETCH 10 LIVE FEEDS</a>`;
            } else if (mode === 'threat') {
                display.innerHTML = `<div style="background:#111; padding:10px; border:1px solid #ef4444; font-size:11px;">
                    <span style="color:#ef4444; font-weight:bold;">TACTICAL RISK: ${threat}%</span><br>
                    <span style="font-size:9px; color:#888;">Active Hostilities in Perimeter. Move with Caution.</span>
                </div>`;
            } else if (mode === 'report') {
                display.innerHTML = `
                    <input type="text" id="report-text" placeholder="Detail threat observation..." class="intel-input">
                    <button class="intel-btn" onclick="sendIntelToDiscord('${city}', '${state}', ${lat}, ${lon})">TRANSMIT TO HQ</button>
                `;
            }
        }

        async function sendIntelToDiscord(city, state, lat, lon) {
            const report = document.getElementById('report-text').value;
            if(!report) return alert("Report required.");

            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: `🚨 FIELD INTEL: ${city.toUpperCase()}`,
                            color: 15548997,
                            fields: [
                                { name: "Sector", value: `${city}, ${state}` },
                                { name: "Coordinates", value: `${lat.toFixed(4)}, ${lon.toFixed(4)}` },
                                { name: "Observation", value: report }
                            ],
                            footer: { text: "JSI Sovereign Tactical Monitor | March 2026" }
                        }]
                    })
                });
                alert("INTEL TRANSMITTED. RETURN TO OVERWATCH.");
                map.closePopup();
            } catch (e) {
                alert("UPLINK FAILED.");
            }
        }
    </script>
</body>
</html>
