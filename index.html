<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI | War Room Command</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05070a; margin: 0; font-family: 'Courier New', Courier, monospace; color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #0b0e14; }
        .sidebar {
            position: absolute; top: 40px; left: 20px; width: 320px; z-index: 1000;
            background: rgba(11, 14, 20, 0.9); border: 1px solid #374151;
            padding: 20px; border-radius: 8px; backdrop-filter: blur(10px);
            max-height: 85vh; overflow-y: auto;
        }
        .section-label { font-size: 10px; color: #ef4444; font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }
        .input-style { background: #1f2937; color: white; width: 100%; padding: 10px; border: 1px solid #4b5563; border-radius: 4px; font-size: 12px; margin-bottom: 12px; }
        .action-btn { background: #1f2937; color: white; width: 100%; padding: 12px; text-transform: uppercase; font-weight: bold; border-radius: 4px; border: 1px solid #4b5563; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .action-btn:hover { background: #374151; }
        .panic-btn { background: #b91c1c; color: white; width: 100%; padding: 15px; text-transform: uppercase; font-weight: 900; border-radius: 4px; border: 2px solid #ef4444; cursor: pointer; }
        
        .ticker-wrap { position: absolute; bottom: 0; width: 100%; height: 40px; background-color: rgba(0, 0, 0, 0.9); border-top: 2px solid #ef4444; z-index: 1001; display: flex; align-items: center; overflow: hidden; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 90s linear infinite; font-weight: bold; color: #ef4444; font-size: 14px; }
        @keyframes ticker { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .danger-pin { background-color: #ef4444; border: 2px solid #fff; border-radius: 50% 50% 0 50%; color: white; font-weight: 800; font-size: 10px; display: flex; align-items: center; justify-content: center; transform: rotate(45deg); box-shadow: 0 0 15px rgba(239, 68, 68, 0.8); animation: pulse 2s infinite; }
        .pin-text { transform: rotate(-45deg); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1 style="color: #ef4444; margin: 0; letter-spacing: 2px; font-size: 22px;">JSI COMMAND</h1>
        <p id="status-time" style="color: #9ca3af; font-size: 10px; margin-bottom: 20px;">SYSTEM ACTIVE</p>
        
        <span class="section-label">1. Locate Theater</span>
        <input type="text" id="search-box" class="input-style" placeholder="Search City/State...">

        <span class="section-label">2. Transcribe Intel</span>
        <select id="threat-type" class="input-style">
            <option value="Physical Threat">Physical Threat</option>
            <option value="Protest/Unrest">Protest/Unrest</option>
            <option value="Vandalism">Vandalism</option>
            <option value="Harassment">Harassment</option>
        </select>
        <button class="action-btn" onclick="logFieldReport()">Post to War Room</button>

        <div style="border-top: 1px solid #374151; margin: 15px 0;"></div>
        
        <button class="panic-btn" onclick="triggerPanic()">⚠️ Signal Emergency</button>
    </div>

    <div class="ticker-wrap">
        <div class="ticker" id="news-ticker">INITIALIZING JSI FEED... SCANNING FOR THREAT DATA...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([35, -40], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let lastSearchedLocation = null;

        // Search and Fly
        document.getElementById('search-box').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const city = e.target.value;
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.length > 0) {
                            lastSearchedLocation = { lat: data[0].lat, lon: data[0].lon, name: city.toUpperCase() };
                            map.flyTo([lastSearchedLocation.lat, lastSearchedLocation.lon], 12);
                        }
                    });
            }
        });

        // Transcribe and Post
        function logFieldReport() {
            if (!lastSearchedLocation) {
                alert("Please search for a location first.");
                return;
            }
            const threat = document.getElementById('threat-type').value;
            const risk = Math.floor(Math.random() * 20) + 80; // Field reports are usually high risk (80%+)
            
            const icon = L.divIcon({ className: 'danger-pin', html: `<span class="pin-text">!</span>`, iconSize: [35, 35] });
            L.marker([lastSearchedLocation.lat, lastSearchedLocation.lon], { icon: icon })
                .addTo(map)
                .bindPopup(`<b style="color:black">FIELD REPORT: ${lastSearchedLocation.name}</b><br><span style="color:red">TYPE: ${threat}</span><br><span style="color:black">URGENCY: ${risk}%</span>`)
                .openPopup();
            
            alert(`Intel Transmitted: ${threat} logged at ${lastSearchedLocation.name}`);
        }

        function addPin(lat, lon, name, risk) {
            const icon = L.divIcon({ className: 'danger-pin', html: `<span class="pin-text">${risk}%</span>`, iconSize: [35, 35] });
            L.marker([lat, lon], { icon: icon }).addTo(map).bindPopup(`<b style="color:black">${name}: ${risk}% Risk</b>`);
        }

        function triggerPanic() {
            const emergencyContact = "911"; 
            const message = encodeURIComponent("JSI EMERGENCY: Active threat detected. Monitor my status: " + window.location.href);
            window.location.href = `sms:${emergencyContact}?&body=${message}`;
        }

        async function updateFeed() {
            const fallback = ["[INTEL] SCANNING FOR LOCAL FIELD REPORTS...", "[SYSTEM] ANALYZING GLOBAL VELOCITY...", "[ALERT] DATA UPLINK STABLE..."];
            try {
                const response = await fetch('https://ok.surf/api/v1/cors/news-feed');
                const data = await response.json();
                const feeds = data.World.slice(0, 10).map(item => `[LIVE] ${item.title.toUpperCase()} --- `);
                document.getElementById('news-ticker').innerText = feeds.join(" ");
            } catch (err) {
                document.getElementById('news-ticker').innerText = fallback.join(" --- ");
            }
            document.getElementById('status-time').innerText = "LIVE // " + new Date().toLocaleTimeString();
        }

        updateFeed();
        setInterval(updateFeed, 300000);
    </script>
</body>
</html>
