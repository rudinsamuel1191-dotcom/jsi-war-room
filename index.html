<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI | Tactical Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Layout Fix: Prevents "stuck" scrolling */
        body { background-color: #000; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #map { position: absolute; top: 35px; bottom: 46px; left: 0; right: 0; z-index: 1; background: #000; }

        /* Access Gate */
        #access-gate { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; transition: opacity 0.8s ease; }
        .gate-input { background: transparent; border: none; border-bottom: 3px solid #ef4444; color: #ef4444; font-size: 34px; width: 150px; text-align: center; outline: none; font-weight: bold; margin: 20px 0; }

        /* TOP NEWS - Fixed to avoid map overlap */
        #news-bulletin-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 35px; background: #ef4444; color: #000; z-index: 5000; display: flex; align-items: center; overflow: hidden; font-weight: 900; font-size: 11px; border-bottom: 1px solid white; }
        .bulletin-label { background: #000; color: #ef4444; padding: 0 15px; height: 100%; display: flex; align-items: center; z-index: 5001; position: relative; white-space: nowrap; border-right: 1px solid white; }
        .news-ticker-move { white-space: nowrap; animation: ticker-news 90s linear infinite; display: flex; }
        .news-item { margin-right: 50px; text-decoration: none; color: inherit; }
        @keyframes ticker-news { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* HUD & Controls */
        #hud-top { position: absolute; top: 50px; left: 15px; right: 15px; z-index: 2000; display: flex; justify-content: space-between; pointer-events: none; }
        .hud-card { background: rgba(0, 0, 0, 0.9); border: 1px solid #ef4444; padding: 10px 15px; border-radius: 4px; pointer-events: auto; }
        
        #action-menu { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 15px; }
        .action-btn { background: #ef4444; color: white; width: 70px; height: 70px; border-radius: 50%; border: 2px solid white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; text-align: center; }

        /* BOTTOM MARKET TICKER - Fixed */
        #ticker-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 46px; background: #000; border-top: 1px solid #ef4444; z-index: 5000; }

        /* Sidebar */
        #briefcase-sidebar { position: fixed; right: -320px; top: 0; width: 320px; height: 100vh; background: #050505; border-left: 2px solid #ef4444; z-index: 9600; transition: 0.4s; padding: 25px; }
        #briefcase-sidebar.open { right: 0; }

        /* Markers */
        .pin-blob { background: #ef4444; border: 2px solid white; border-radius: 50% 50% 50% 0; width: 30px; height: 30px; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; }
        .pin-label { background: rgba(0,0,0,0.85); color: white; font-size: 8px; padding: 2px 5px; border-radius: 3px; margin-top: 5px; font-weight: bold; border: 1px solid #444; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="access-gate">
        <div class="hebrew-text" style="font-size:24px; font-weight:bold;">שמע ישראל ה' אלוהינו ה'</div>
        <input type="text" id="gate-key" class="gate-input" placeholder="____" autocomplete="off">
        <button onclick="manualUnlock()" style="background:#ef4444; color:white; padding:10px 20px; font-weight:900; border-radius:4px; cursor:pointer;">AUTHORIZE</button>
    </div>

    <div id="news-bulletin-wrap">
        <div class="bulletin-label">GLOBAL INTEL FEED</div>
        <div class="news-ticker-move" id="live-news-ticker">CONNECTING...</div>
    </div>

    <div id="map"></div>

    <div id="hud-top">
        <div class="hud-card">
            <div style="font-size: 8px; color: #9ca3af;">NODES ONLINE</div>
            <div id="user-count" style="color: #10b981; font-weight: 900; font-size: 18px;">6,412</div>
        </div>
        <div class="hud-card">
            <input type="text" id="map-search" placeholder="SEARCH..." class="bg-transparent border-b border-red-500 outline-none text-white text-xs w-24 py-1 uppercase font-bold">
        </div>
    </div>

    <div id="action-menu">
        <div class="action-btn" onclick="openReport()"><span>📡</span>REPORT</div>
        <div class="action-btn" style="background:#1f2937;" onclick="toggleBriefcase()"><span>💼</span>CASE</div>
        <div class="action-btn" style="background:#7c3aed;" onclick="shareSite()"><span>🔗</span>SHARE</div>
    </div>

    <div id="ticker-container">
        <div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div>
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {"symbols": [{"proName": "OANDA:XAUUSD", "title": "GOLD"},{"proName": "FX_IDC:USDILS", "title": "USD/ILS"},{"proName": "BITSTAMP:BTCUSD", "title": "BTC"},{"proName": "OANDA:WTICOUSD", "title": "OIL"}],"colorTheme": "dark","isTransparent": true,"displayMode": "adaptive","locale": "en"}
        </script></div>
    </div>

    <div id="report-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; display:none; align-items:center; justify-content:center; padding:20px;">
        <div style="background:#0a0a0a; border:1px solid #333; width:100%; max-width:400px; padding:25px; border-top:5px solid #ef4444;">
            <h2 class="text-white font-black uppercase">TRANSMIT INTEL</h2>
            <input type="text" id="report-loc" placeholder="City" style="width:100%; background:#111; border:1px solid #444; color:white; padding:12px; margin-top:15px; outline:none;">
            <select id="report-type" style="width:100%; background:#111; border:1px solid #444; color:white; padding:12px; margin-top:10px;">
                <option>ANTI-SEMITIC INCIDENT</option>
                <option>PROTEST / RIOT</option>
                <option>HOSTILE ACTIVITY</option>
            </select>
            <div class="flex gap-2 mt-6">
                <button onclick="document.getElementById('report-modal').style.display='none'" class="flex-1 bg-zinc-800 py-3 font-bold uppercase text-[10px]">Abort</button>
                <button onclick="submitIntel()" class="flex-1 bg-red-600 py-3 font-bold uppercase text-[10px]">Transmit</button>
            </div>
        </div>
    </div>

    <div id="briefcase-sidebar">
        <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-2">
            <h2 class="text-red-500 font-black text-xs">OPERATOR BRIEFCASE</h2>
            <button onclick="toggleBriefcase()" class="text-white font-bold">×</button>
        </div>
        <div id="briefcase-content"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const JERUSALEM = [31.7683, 35.2137];
        const DISCORD_WEBHOOK_URL = "PASTE_YOUR_WEBHOOK_HERE"; // Put your URL here

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(JERUSALEM, 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let reports = [];
        let savedIntel = JSON.parse(localStorage.getItem('jsi_briefcase')) || [];

        function manualUnlock() {
            if (document.getElementById('gate-key').value.trim() === 'אחד') {
                document.getElementById('access-gate').style.opacity = '0';
                setTimeout(() => { 
                    document.getElementById('access-gate').style.display = 'none'; 
                    map.invalidateSize(); // Refreshes map to prevent "grey box"
                    fetchLiveNews();
                    updateBriefcaseUI();
                }, 800);
            }
        }

        async function fetchLiveNews() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://news.google.com/rss/search?q=world+breaking+news&hl=en-US&gl=US&ceid=US:en')}`);
                const data = await res.json();
                if(data.items) {
                    const html = data.items.slice(0, 10).map(i => `<a href="${i.link}" target="_blank" class="news-item">[ INTEL: ${i.title.toUpperCase()} ]</a>`).join(' • ');
                    document.getElementById('live-news-ticker').innerHTML = html + ' • ' + html;
                }
            } catch (e) { document.getElementById('live-news-ticker').innerText = "SIGNAL DELAYED..."; }
        }

        async function submitIntel() {
            const city = document.getElementById('report-loc').value;
            const type = document.getElementById('report-type').value;
            if(!city) return;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`);
            const data = await res.json();
            if(data[0]) {
                const { lat, lon } = data[0];
                const icon = L.divIcon({ html: `<div class="pin-blob"><span style="transform:rotate(45deg);font-size:10px;font-weight:900;">!</span></div><div class="pin-label">${city.toUpperCase()}</div>`, className: 'custom-icon' });
                L.marker([lat, lon], {icon}).addTo(map);
                map.flyTo([lat, lon], 10);
                
                // DISCORD DISPATCH
                if (DISCORD_WEBHOOK_URL.includes("discord.com")) {
                    fetch(DISCORD_WEBHOOK_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ content: `🚨 **MONITOR ALERT**: ${city.toUpperCase()} | Event: ${type}` })
                    });
                }
                document.getElementById('report-modal').style.display='none';
            }
        }

        function toggleBriefcase() { document.getElementById('briefcase-sidebar').classList.toggle('open'); }
        function openReport() { document.getElementById('report-modal').style.display = 'flex'; }
        function shareSite() { navigator.share ? navigator.share({text: `JSI Tactical | Pass: אחד`}) : alert("Link Copied"); }
        function updateBriefcaseUI() { /* LocalStorage logic here */ }

        // Search trigger
        document.getElementById('map-search').addEventListener('keypress', e => {
            if (e.key === 'Enter') { document.getElementById('report-loc').value = e.target.value; openReport(); }
        });
    </script>
</body>
</html>
