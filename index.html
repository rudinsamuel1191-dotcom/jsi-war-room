<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI | Tactical Risk Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05070a; margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #0b0e14; }
        
        /* Identity Gate Overlay - Enhanced Visuals */
        #access-gate {
            position: fixed; inset: 0; z-index: 9999; 
            background-color: #05070a;
            background-image: linear-gradient(to bottom, rgba(5, 7, 10, 0.4), rgba(5, 7, 10, 0.9)), 
                              url('https://i.imgur.com/kS5x87J.jpeg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px; transition: opacity 1.5s ease;
        }
        .hebrew-text { font-size: 36px; font-weight: bold; margin-bottom: 35px; letter-spacing: 2px; text-shadow: 0 0 15px rgba(255,255,255,0.7); }
        .gate-input {
            background: rgba(255,255,255,0.1); border: none; border-bottom: 3px solid #ef4444;
            color: #ef4444; font-size: 36px; width: 140px; text-align: center;
            outline: none; font-weight: bold; margin: 0 10px; border-radius: 4px;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .gate-input:focus { border-color: #10b981; background: rgba(255,255,255,0.15); }
        .gate-hint { color: #d1d5db; font-size: 11px; margin-top: 50px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }

        /* HUD & UI Elements */
        #hud-top { position: absolute; top: 0; width: 100%; z-index: 1000; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; }
        .hud-card { background: rgba(0, 0, 0, 0.85); border: 1px solid #ef4444; padding: 10px 20px; border-radius: 4px; pointer-events: auto; backdrop-filter: blur(5px); }
        #action-menu { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .action-btn { background: #ef4444; color: white; padding: 15px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); cursor: pointer; transition: 0.3s; width: 65px; height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .btn-strike { background: #f97316; }
        .btn-secondary { background: #1e293b; border-color: #475569; width: 50px; height: 50px; align-self: flex-end; }
        
        /* Ticker */
        #ticker-wrap { position: absolute; bottom: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.9); border-top: 2px solid #ef4444; z-index: 1001; display: flex; align-items: center; overflow: hidden; }
        .ticker-move { white-space: nowrap; animation: ticker 120s linear infinite; color: #ef4444; font-weight: bold; font-size: 14px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Visuals */
        .impact-ring { border: 2px solid #f97316; border-radius: 50%; background: rgba(249, 115, 22, 0.2); animation: impact 2s ease-out infinite; }
        @keyframes impact { 0% { transform: scale(0.1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        .risk-pin { background: #ef4444; border: 2px solid white; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; }
        .risk-text { transform: rotate(45deg); font-size: 10px; font-weight: 900; color: white; }
    </style>
</head>
<body>

    <div id="access-gate">
        <div class="hebrew-text" dir="rtl">
            שמע ישראל ה' אלוהינו ה' <input type="text" id="gate-key" class="gate-input" placeholder="____" oninput="checkGate(this)" autocomplete="off">
        </div>
        <div class="gate-hint">Verification Required for Tactical Uplink</div>
    </div>

    <div id="hud-top">
        <div class="hud-card">
            <div style="font-size: 9px; color: #9ca3af; text-transform: uppercase;">Uplink Secure</div>
            <div style="color: #10b981; font-weight: bold; font-size: 18px;"><span id="user-count">5681</span> ACTIVE OPS</div>
        </div>
        <div class="hud-card">
            <input type="text" id="map-search" placeholder="CHECK SECTOR..." class="bg-transparent border-b border-red-500 outline-none text-white text-sm w-36 py-1 uppercase font-bold">
        </div>
    </div>

    <div id="action-menu">
        <div class="action-btn" onclick="reportIncident()"><span>📢</span>INTEL</div>
        <div class="action-btn btn-strike" onclick="reportRocket()"><span>🚀</span>STRIKE</div>
        <div class="action-btn btn-secondary" onclick="shareSite()"><span>🔗</span></div>
        <div class="action-btn btn-secondary" onclick="toggleMapMode()"><span>🌗</span></div>
    </div>

    <div id="map"></div>

    <div id="ticker-wrap">
        <div class="ticker-move" id="news-stream">INITIALIZING GLOBAL RISK ANALYSIS... STANDBY...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([31, 35], 5);
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const lightLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        let currentLayer = darkLayer;

        let reports = [
            { id: 1, name: "Jerusalem", lat: 31.7683, lng: 35.2137, risk: 96, lastUpdate: Date.now(), type: 'risk' },
            { id: 2, name: "Tel Aviv", lat: 32.0853, lng: 34.7818, risk: 85, lastUpdate: Date.now(), type: 'risk' }
        ];

        // Access Gate Logic
        function checkGate(el) {
            if (el.value.trim() === 'אחד') {
                document.getElementById('access-gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('access-gate').style.display = 'none';
                    initializeSystem();
                }, 1500);
            }
        }

        function initializeSystem() {
            updateHUD();
            getNews();
            setInterval(updateHUD, 4000);
            setInterval(decayLogic, 15000);
            // Autofocus search on entry
            setTimeout(() => document.getElementById('map-search').focus(), 500);
        }

        // HUD & Data Logic
        function updateHUD() {
            document.getElementById('user-count').innerText = (5500 + Math.floor(Math.random() * 600)).toLocaleString();
            reports.forEach(r => { r.risk = Math.min(100, Math.max(10, r.risk + (Math.random() * 1.6 - 0.8))); });
            renderPins();
        }

        function decayLogic() {
            const now = Date.now();
            reports.forEach(r => {
                const ageHours = (now - r.lastUpdate) / (1000 * 60 * 60);
                if (ageHours > 0.005) r.risk *= 0.995; 
            });
        }

        function reportIncident() {
            const name = prompt("Location of Anti-Semitic incident:");
            if (name) processReport(name, 25, 'risk');
        }

        function reportRocket() {
            const name = prompt("Location of Rocket Impact:");
            if (name) processReport(name, 45, 'strike');
        }

        function processReport(name, impact, type) {
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${name}`)
            .then(res => res.json()).then(data => {
                if (data.length > 0) {
                    const { lat, lon } = data[0];
                    const existing = reports.find(r => r.name.toLowerCase() === name.toLowerCase());
                    if (existing) {
                        existing.risk = Math.min(100, existing.risk + impact);
                        existing.type = type;
                        existing.lastUpdate = Date.now();
                    } else {
                        reports.push({ name: name.toUpperCase(), lat: parseFloat(lat), lng: parseFloat(lon), risk: 70 + impact, lastUpdate: Date.now(), type: type });
                    }
                    map.flyTo([lat, lon], 10);
                    renderPins();
                }
            });
        }

        let markers = [];
        function renderPins() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            reports.forEach(r => {
                const bounds = map.getBounds();
                if (r.risk >= 80 || bounds.contains([r.lat, r.lng])) {
                    let iconHtml = (r.type === 'strike') 
                        ? `<div class="impact-ring" style="width:40px; height:40px; display:flex; align-items:center; justify-content:center;">🚀</div>`
                        : `<div class="risk-pin ${r.risk >= 80 ? 'high-risk' : ''}" style="width:30px; height:30px;"><span class="risk-text">${Math.floor(r.risk)}%</span></div>`;
                    
                    const m = L.marker([r.lat, r.lng], { icon: L.divIcon({ html: iconHtml, iconSize: [40, 40], className: 'c-pin' }) }).addTo(map);
                    m.bindPopup(`<b>${r.name}</b><br>Risk: ${Math.floor(r.risk)}%`);
                    markers.push(m);
                }
            });
        }

        function toggleMapMode() {
            map.removeLayer(currentLayer);
            currentLayer = (currentLayer === darkLayer) ? lightLayer : darkLayer;
            currentLayer.addTo(map);
        }

        function shareSite() {
            const text = "⚠️ JSI Live Risk Monitor. Access authorized.";
            if (navigator.share) navigator.share({ title: 'JSI', text: text, url: window.location.href });
            else { navigator.clipboard.writeText(text + " " + window.location.href); alert("Link Copied."); }
        }

        async function getNews() {
            try {
                const res = await fetch('https://ok.surf/api/v1/cors/news-feed');
                const data = await res.json();
                document.getElementById('news-stream').innerText = data.World.map(n => ` [LIVE REPORT] ${n.title.toUpperCase()} ••• `).join(""); 
            } catch (e) { document.getElementById('news-stream').innerText = "STREAMING GLOBAL TACTICAL DATA... "; }
        }
        
        document.getElementById('map-search').addEventListener('keypress', e => { if (e.key === 'Enter') processReport(e.target.value, 0, 'risk'); });
    </script>
</body>
</html>
