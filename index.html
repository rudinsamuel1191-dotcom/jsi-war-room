<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI | Tactical Sovereign Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #map { position: absolute; top: 35px; bottom: 46px; left: 0; right: 0; z-index: 1; background: #000; cursor: crosshair; }

        /* Access Gate */
        #access-gate { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; transition: opacity 0.8s ease; }
        .gate-input { background: transparent; border: none; border-bottom: 3px solid #ef4444; color: #ef4444; font-size: 34px; width: 150px; text-align: center; outline: none; font-weight: bold; margin: 20px 0; }

        /* HUD & Ticker */
        #news-bulletin-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 35px; background: #ef4444; color: #000; z-index: 5000; display: flex; align-items: center; overflow: hidden; font-weight: 900; font-size: 11px; border-bottom: 1px solid white; }
        .bulletin-label { background: #000; color: #ef4444; padding: 0 15px; height: 100%; display: flex; align-items: center; z-index: 5001; position: relative; white-space: nowrap; border-right: 1px solid white; }
        .news-ticker-move { white-space: nowrap; animation: ticker-news 120s linear infinite; display: flex; }
        .news-item { margin-right: 50px; text-decoration: none; color: inherit; }
        @keyframes ticker-news { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        #action-menu { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .action-btn { background: #ef4444; color: white; width: 60px; height: 60px; border-radius: 50%; border: 2px solid white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; text-align: center; line-height: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        #coord-hud { position: absolute; left: 10px; bottom: 60px; z-index: 2000; background: rgba(0,0,0,0.7); padding: 5px 10px; font-family: monospace; font-size: 10px; color: #ef4444; border-left: 3px solid #ef4444; pointer-events: none; }

        /* Tactical Elements */
        .pin-blob { background: #ef4444; border: 2px solid white; border-radius: 50% 50% 50% 0; width: 30px; height: 30px; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .pin-label { background: rgba(0,0,0,0.85); color: white; font-size: 8px; padding: 2px 5px; border-radius: 3px; margin-top: 5px; font-weight: bold; border: 1px solid #444; white-space: nowrap; text-transform: uppercase; }
        .intel-link { display: block; background: #eee; color: #000 !important; font-size: 10px; padding: 10px; margin-top: 5px; text-align: center; font-weight: bold; text-decoration: none; border-radius: 3px; border-left: 4px solid #ef4444; }

        #briefcase-sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100vh; background: #050505; border-left: 2px solid #ef4444; z-index: 6000; transition: 0.4s; padding: 20px; overflow-y: auto; }
        #briefcase-sidebar.open { right: 0; }

        /* Real-time Pulse */
        .user-pulse { width: 20px; height: 20px; background: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px #3b82f6; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 70% { transform: scale(1.5); opacity: 0; } 100% { transform: scale(0.9); opacity: 0; } }
        .user-tag { color:#3b82f6; font-weight:900; font-size:10px; position:absolute; top:25px; white-space:nowrap; left:-20px; background:white; padding:2px 6px; border-radius:3px; border:1px solid #3b82f6; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="access-gate">
        <div style="font-size:24px; font-weight:bold; color:white; letter-spacing: 2px;">שמע ישראל ה' אלוהינו ה'</div>
        <input type="text" id="gate-key" class="gate-input" placeholder="____" autocomplete="off">
        <button onclick="manualUnlock()" style="background:#ef4444; color:white; padding:12px 30px; font-weight:900; border-radius:4px; margin-top:10px;">ESTABLISH UPLINK</button>
    </div>

    <div id="news-bulletin-wrap">
        <div class="bulletin-label">LIVE INTEL</div>
        <div class="news-ticker-move" id="live-news-ticker">SIGNAL SEARCHING...</div>
    </div>

    <div id="coord-hud">LAT: 0.0000 | LON: 0.0000</div>
    <div id="map"></div>

    <div id="action-menu">
        <div class="action-btn" onclick="openReport()"><span>📡</span>REPORT</div>
        <div id="gps-btn" class="action-btn" style="background:#3b82f6;" onclick="toggleTracking()"><span>📍</span>UPLINK</div>
        <div id="view-btn" class="action-btn" style="background:#111;" onclick="toggleMapMode()"><span>🛰️</span>SAT</div>
        <div class="action-btn" style="background:#1f2937;" onclick="toggleBriefcase()"><span>💼</span>CASE</div>
        <div class="action-btn" style="background:#7c3aed;" onclick="shareSite()"><span>🔗</span>SHARE</div>
    </div>

    <div id="briefcase-sidebar">
        <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-2">
            <h2 class="text-red-500 font-black text-xs uppercase">Tactical Briefcase</h2>
            <button onclick="toggleBriefcase()" class="text-white font-bold text-xl">×</button>
        </div>
        <div id="case-list" class="space-y-3"></div>
        <button onclick="clearBriefcase()" class="w-full bg-red-600 text-[10px] font-bold py-3 mt-6 uppercase tracking-widest">Wipe Intelligence</button>
    </div>

    <div id="report-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9999; display:none; align-items:center; justify-content:center; padding:20px;">
        <div style="background:#0a0a0a; border:1px solid #333; width:100%; max-width:400px; padding:25px; border-top:5px solid #ef4444;">
            <h2 class="text-white font-black uppercase tracking-tighter text-xl">Transmit Intel</h2>
            <p id="resolved-address" style="color:#ef4444; font-size:10px; margin-top:5px; font-family:monospace; font-weight:bold;"></p>
            <input type="text" id="report-loc" placeholder="Optional Label" style="width:100%; background:#111; border:1px solid #444; color:white; padding:15px; margin-top:10px; outline:none; font-size:12px;">
            <select id="report-type" style="width:100%; background:#111; border:1px solid #444; color:white; padding:15px; margin-top:10px; font-size:12px;">
                <option>ANTI-SEMITIC INCIDENT</option>
                <option>PROTEST / RIOT</option>
                <option>HOSTILE ACTIVITY</option>
                <option>MILITARY MOVEMENT</option>
            </select>
            <div class="flex gap-3 mt-8">
                <button onclick="closeReport()" class="flex-1 bg-zinc-800 py-4 font-bold uppercase text-[10px] tracking-widest">Abort</button>
                <button onclick="submitIntel()" class="flex-1 bg-red-600 py-4 font-bold uppercase text-[10px] tracking-widest">Transmit</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const JERUSALEM = [31.7683, 35.2137];
        const DISCORD_WEBHOOK_URL = "PASTE_YOUR_WEBHOOK_HERE";

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(JERUSALEM, 3);
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        const satTiles = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        
        let isSatMode = false;
        let tappedCoords = null;
        let tappedAddress = "";
        let userMarker = null;
        let isTracking = false;

        darkTiles.addTo(map);

        function manualUnlock() {
            if (document.getElementById('gate-key').value.trim() === 'אחד') {
                document.getElementById('access-gate').style.opacity = '0';
                
                // Alert Discord: System Online
                sendDiscordAlert("SYSTEM ONLINE", "A user has successfully authenticated the JSI Gate Key.");

                setTimeout(() => { 
                    document.getElementById('access-gate').style.display = 'none'; 
                    map.invalidateSize();
                    fetchLiveNews();
                    loadBriefcase();
                }, 800);
            }
        }

        // Live Tracking Toggle
        function toggleTracking() {
            if (!isTracking) {
                map.locate({setView: true, watch: true, maxZoom: 16, enableHighAccuracy: true});
                document.getElementById('gps-btn').innerHTML = "<span>📡</span>LIVE";
                isTracking = true;
            } else {
                map.stopLocate();
                if(userMarker) map.removeLayer(userMarker);
                document.getElementById('gps-btn').innerHTML = "<span>📍</span>UPLINK";
                isTracking = false;
            }
        }

        map.on('locationfound', function(e) {
            if (userMarker) map.removeLayer(userMarker);
            const userIcon = L.divIcon({ 
                className: 'user-pulse', 
                html: '<div class="user-tag">I\'M HERE</div>' 
            });
            userMarker = L.marker(e.latlng, {icon: userIcon}).addTo(map);
        });

        // HUD Coordinate Tracking
        map.on('move', function() {
            const center = map.getCenter();
            document.getElementById('coord-hud').innerText = `LAT: ${center.lat.toFixed(4)} | LON: ${center.lng.toFixed(4)}`;
        });

        map.on('click', async function(e) {
            tappedCoords = e.latlng;
            document.getElementById('resolved-address').innerText = "LOCKING SECTOR...";
            openReport(true);
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
                const data = await res.json();
                tappedAddress = data.address.city || data.address.town || data.address.country || "UNKNOWN";
                document.getElementById('resolved-address').innerText = `SECTOR: ${tappedAddress.toUpperCase()}`;
            } catch (err) { tappedAddress = "MARKED POINT"; }
        });

        async function submitIntel() {
            const userLabel = document.getElementById('report-loc').value;
            const type = document.getElementById('report-type').value;
            let lat, lon, finalName;

            if (tappedCoords) {
                lat = tappedCoords.lat; lon = tappedCoords.lng;
                finalName = (userLabel || tappedAddress).toUpperCase();
            } else if (userLabel) {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${userLabel}`);
                const data = await res.json();
                if(data[0]) { lat = parseFloat(data[0].lat); lon = parseFloat(data[0].lon); finalName = userLabel.toUpperCase(); }
                else return;
            } else return;

            saveToBriefcase({ name: finalName, type, lat, lon });
            dropPin(finalName, type, lat, lon);
            sendDiscordAlert(`🚨 INTEL: ${finalName}`, `Type: ${type}\nGPS: ${lat.toFixed(4)}, ${lon.toFixed(4)}\n[View on Google](https://www.google.com/maps?q=${lat},${lon})`);

            map.flyTo([lat, lon], 14);
            closeReport();
            document.getElementById('report-loc').value = "";
        }

        function dropPin(name, type, lat, lon) {
            const icon = L.divIcon({ html: `<div class="pin-blob">!</div><div class="pin-label">${name}</div>`, className: 'custom-icon' });
            const marker = L.marker([lat, lon], {icon}).addTo(map);
            const newsLink = `https://www.google.com/search?q=${encodeURIComponent(name)}+breaking+news&tbm=nws`;
            marker.bindPopup(`<div style="color:#000; width:180px;"><b>${name}</b><br><div style="font-size:10px; color:red; font-weight:bold; margin-bottom:5px;">${type}</div><a href="${newsLink}" target="_blank" class="intel-link">TOP 10 NEWS ARTICLES</a></div>`);
        }

        function sendDiscordAlert(title, message) {
            if (DISCORD_WEBHOOK_URL.includes("discord.com")) {
                fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ embeds: [{ title: title, description: message, color: 15548997, timestamp: new Date() }] })
                });
            }
        }

        function saveToBriefcase(item) {
            let items = JSON.parse(localStorage.getItem('jsi_case')) || [];
            items.push(item);
            localStorage.setItem('jsi_case', JSON.stringify(items));
            renderBriefcase();
        }

        function loadBriefcase() {
            let items = JSON.parse(localStorage.getItem('jsi_case')) || [];
            items.forEach(i => dropPin(i.name, i.type, i.lat, i.lon));
            renderBriefcase();
        }

        function renderBriefcase() {
            let items = JSON.parse(localStorage.getItem('jsi_case')) || [];
            const list = document.getElementById('case-list');
            list.innerHTML = items.map(i => `<div class="case-entry"><b>${i.name}</b><br><span style="color:#ef4444;">${i.type}</span></div>`).join('');
        }

        function clearBriefcase() { localStorage.removeItem('jsi_case'); location.reload(); }
        function toggleBriefcase() { document.getElementById('briefcase-sidebar').classList.toggle('open'); }

        function toggleMapMode() {
            const btn = document.getElementById('view-btn');
            if (!isSatMode) {
                map.removeLayer(darkTiles); satTiles.addTo(map);
                btn.innerHTML = "<span>🗺️</span>DARK"; btn.style.background = "#ef4444"; isSatMode = true;
            } else {
                map.removeLayer(satTiles); darkTiles.addTo(map);
                btn.innerHTML = "<span>🛰️</span>SAT"; btn.style.background = "#111"; isSatMode = false;
            }
        }

        async function fetchLiveNews() {
            try {
                const center = map.getCenter();
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://news.google.com/rss/search?q=unrest+conflict+breaking+news&hl=en-US&gl=US&ceid=US:en')}`);
                const data = await res.json();
                if(data.items) {
                    const html = data.items.slice(0, 15).map(i => `<a href="${i.link}" target="_blank" class="news-item">[ INTEL: ${i.title.toUpperCase()} ]</a>`).join(' • ');
                    document.getElementById('live-news-ticker').innerHTML = html + ' • ' + html;
                }
            } catch (e) { document.getElementById('live-news-ticker').innerText = "SIGNAL DELAYED..."; }
        }

        function openReport(isTap = false) { document.getElementById('report-modal').style.display = 'flex'; }
        function closeReport() { document.getElementById('report-modal').style.display = 'none'; tappedCoords = null; }
        function shareSite() {
            const msg = `⚠️ JSI TACTICAL MONITOR | LIVE UPLINK\n\nLink: Jewish Safety Index (${window.location.href})\nPass: אחד`;
            navigator.share ? navigator.share({text: msg}) : (navigator.clipboard.writeText(msg), alert("Copied to Clipboard"));
        }
    </script>
</body>
</html>
