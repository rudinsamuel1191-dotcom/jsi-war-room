<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI | Tactical Monitor v3.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #map { position: absolute; top: 75px; bottom: 46px; left: 0; right: 0; z-index: 1; background: #000; border-bottom: 2px solid #ef4444; }
        
        /* Access Gate */
        #access-gate { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; transition: opacity 0.8s ease; }
        .gate-input { background: transparent; border: none; border-bottom: 3px solid #ef4444; color: #ef4444; font-size: 34px; width: 150px; text-align: center; outline: none; font-weight: bold; margin: 20px 0; }

        /* News & Search */
        #news-bulletin-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 35px; background: #ef4444; color: #000; z-index: 5000; display: flex; align-items: center; overflow: hidden; font-weight: 900; font-size: 11px; border-bottom: 1px solid white; }
        #search-box { position: fixed; top: 35px; left: 0; width: 100%; height: 40px; background: #111; z-index: 4000; display: flex; border-bottom: 1px solid #333; }
        #search-input { flex: 1; background: transparent; border: none; padding: 0 15px; color: white; font-size: 12px; font-weight: bold; outline: none; text-transform: uppercase; }
        #search-btn { background: #ef4444; padding: 0 20px; color: black; font-weight: 900; font-size: 10px; cursor: pointer; border-left: 1px solid white; display: flex; align-items: center; }

        /* Tactical HUD Elements */
        .zoom-btn { background: #111; color: white; width: 45px; height: 45px; border: 1px solid #ef4444; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px #ef444455; }
        .pin-label { background: rgba(0,0,0,0.9); color: white; font-size: 9px; padding: 2px 6px; border-radius: 2px; margin-top: 5px; font-weight: 900; border: 1px solid #ef4444; white-space: nowrap; text-transform: uppercase; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .hotspot-blob { background: #f59e0b; border: 2px solid white; border-radius: 50% 50% 50% 0; width: 32px; height: 32px; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; color: black; font-weight: 900; font-size: 14px; box-shadow: 0 0 20px #f59e0b; }

        /* Price Ticker Container */
        #price-ticker { position: fixed; bottom: 0; left: 0; width: 100%; height: 46px; z-index: 5000; background: #000; border-top: 1px solid #ef4444; }
    </style>
</head>
<body>

    <div id="access-gate">
        <div style="font-size:24px; font-weight:bold; color:white; letter-spacing:1px;">שמע ישראל ה' אלוהינו ה'</div>
        <input type="text" id="gate-key" class="gate-input" placeholder="____" autocomplete="off">
