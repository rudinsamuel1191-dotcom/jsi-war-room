<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI | Tactical Sovereign Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #map { position: absolute; top: 60px; bottom: 46px; left: 0; right: 0; z-index: 1; background: #000; cursor: crosshair; }
        
        /* Access Gate */
        #access-gate { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; transition: opacity 0.8s ease; }
        .gate-input { background: transparent; border: none; border-bottom: 3px solid #ef4444; color: #ef4444; font-size: 34px; width: 150px; text-align: center; outline: none; font-weight: bold; margin: 20px 0; }

        /* Global Threat Ticker */
        #threat-ticker { position: fixed; top: 0; left: 0; width: 100%; height: 25px; background: #111; border-bottom: 1px solid #333; z-index: 5005; display: flex; align-items: center; font-size: 10px; font-weight: bold; overflow: hidden; }
        .threat-level-bar { height: 100%; background: #ef4444; transition: width 2s ease-in-out; }

        /* News HUD */
        #news-bulletin-wrap { position: fixed; top: 25px; left: 0; width: 100%; height: 35px; background: #ef4444; color: #000; z-index: 5000; display: flex; align-items: center; overflow: hidden; font-weight: 900; font-size: 11px; border-bottom: 1px solid white; }
        .bulletin-label { background: #000; color: #ef4444; padding: 0 15px; height: 100%; display: flex; align-items: center; z-index: 5001; position: relative; white-space: nowrap; border-right: 1px solid white; }
        .news-ticker-move { white-space: nowrap; animation: ticker-news 90s linear infinite; display: flex; }
        .news-item { margin-right: 50px; text-decoration: none; color: inherit; }
        @keyframes ticker-news { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* Actions */
        #action-menu { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 12px; }
        .action-btn { background: #ef4444; color: white; width: 65px; height: 65px; border-radius: 50%; border: 2px solid white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; text-align: center; line-height: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent; }
        
        /* Pin Styling */
        .pin-blob { border: 2px solid white; border-radius: 50% 50% 50% 0; width: 30px; height: 30px; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .pin-label { background: rgba(0,0,0,0.85); color: white; font-size: 8px; padding: 2px 5px; border-radius: 3px; margin-top: 5px; font-weight: bold; border: 1px solid #444; white-space: nowrap; text-transform: uppercase; }
        .intel-link { display: block; background: #eee; color: #000 !important; font-size: 10px; padding: 8px; margin-top: 5px; text-align: center; font-weight: bold; text-decoration: none; border-radius: 3px; border-left: 4px solid #ef4444; }
        
        /* Sidebar */
        #briefcase-sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100vh; background: #050505; border-left: 2px solid #ef4444; z-index: 6000; transition: 0.4s; padding: 20px; overflow-y: auto; }
        #briefcase-sidebar.open { right: 0; }
        .case-entry { background: #111; border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 11px; }

        .user-pulse { width: 18px; height: 18px; background: #3b82f6; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 15px #3b82f6; animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim { 0% { transform: scale(0.9); opacity: 1; } 70% { transform: scale(1.5); opacity: 0.3; } 100% { transform: scale(0.9); opacity: 1; } }

        #ticker-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 46px; background: #000; border-top: 1px solid #ef4444; z-index: 5000; }
    </style>
</head>
<body>

    <div id="access-gate">
        <div style="font-size:24px; font-weight:bold; color:white; letter-spacing:1px;">שמע ישראל ה' אלוהינו ה'</div>
        <input type="text" id="gate-key" class="gate-input" placeholder="____" autocomplete="off" autofocus>
        <button onclick="manualUnlock()" style="background:#ef4444; color:white; padding:12px 30px; font-weight:900; border-radius:4px; margin-top:10px;">ESTABLISH UPLINK</button>
    </div>

    <div id="threat-ticker">
        <div id="threat-bar" class="threat-level-bar" style="width: 50%;"></div>
        <div id="threat-text" style="position:absolute; width:100%; text-align:center; text-shadow: 1px 1px black;">GLOBAL RISK INDEX: CALCULATING...</div>
    </div>

    <div id="news-bulletin-wrap">
        <div class="bulletin-label">GLOBAL INTEL</div>
        <div class="news-ticker-move" id="live-news-ticker">CONNECTING...</div>
    </div>

    <div id="map"></div>

    <div id="action-menu">
        <div class="action-btn" onclick="openReport()"><span>📡</span>REPORT</div>
        <div class="action-btn" style="background:#3b82f6;" onclick="locateUser()"><span>📍</span>UPLINK</div>
        <div id="day-night-btn" class="action-btn" style="background:#333;" onclick="toggleMapMode()"><span>🌞</span>DAY</div>
        <div class="action-btn" style="background:#1f2937;" onclick="toggleBriefcase()"><span>💼</span>CASE</div>
        <div class="action-btn" style="background:#7c3aed;" onclick="shareSite()"><span>🔗</span>SHARE</div>
    </div>

    <div id="briefcase-sidebar">
        <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-2">
            <h2 class="text-red-500 font-black text-xs uppercase tracking-widest">Operator Briefcase</h2>
            <button onclick="toggleBriefcase()" class="text-white font-bold text-xl">×</button>
        </div>
        <div id="case-list"></div>
        <button onclick="clearBriefcase()" class="w-full bg-red-600 text-[10px] font-bold py-3 mt-4 uppercase tracking-widest">Wipe Memory</button>
    </div>

    <div id="ticker-container">
        <div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div>
        <script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {"symbols": [{"proName": "OANDA:XAUUSD", "title": "GOLD"},{"proName": "FX_IDC:USDILS", "title": "USD/ILS"},{"proName": "BITSTAMP:BTCUSD", "title": "BTC"}],"colorTheme": "dark","isTransparent": true,"displayMode": "adaptive","locale": "en"}
        </script></div>
    </div>

    <div id="report-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9999; display:none; align-items:center; justify-content:center; padding:20px;">
        <div style="background:#0a0a0a; border:1px solid #333; width:100%; max-width:400px; padding:25px; border-top:5px solid #ef4444;">
            <h2 class="text-white font-black uppercase text-xl">Transmit Intel</h2>
            <p id="resolved-address" style="color:#ef4444; font-size:10px; margin-top:5px; font-family:monospace; font-weight:bold;"></p>
            <input type="text" id="report-loc" placeholder="Optional Label" style="width:100%; background:#111; border:1px solid #444; color:white; padding:15px; margin-top:10px; outline:none; font-size:12px;">
            <select id="report-type" style="width:100%; background:#111; border:1px solid #444; color:white; padding:15px; margin-top:10px; font-size:12px;">
                <option>ANTI-SEMITIC INCIDENT</option>
                <option>PROTEST / RIOT</option>
                <option>HOSTILE ACTIVITY</option>
                <option>MILITARY MOVEMENT</option>
            </select>
            <div class="flex gap-3 mt-8">
                <button onclick="closeReport()" class="flex-1 bg-zinc-800 py-4 font-bold uppercase text-[10px] tracking-widest">Abort</button>
                <button onclick="submitIntel()" class="flex-1 bg-red-600 py-4 font-bold uppercase text-[10px] tracking-widest">Transmit</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1482741387534274581/_28vC-BnDqL8_AFeGLnUaAGZ8brAgVyjJQuvF5oNXJvp66CCSdI-B2CKVlY1BeG82tlh";
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([30, 0], 2);
        
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        const lightTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        darkTiles.addTo(map);

        let isDarkMode = true;
        let tappedCoords = null;
        let tappedAddress = "";
        let userMarker = null;
        let hubMarkers = [];

        const HUBS = [
            { name: "Tel Aviv", lat: 32.0853, lon: 34.7818, base: 91 },
            { name: "New York City", lat: 40.7128, lon: -74.0060, base: 72 },
            { name: "Jerusalem", lat: 31.7683, lon: 35.2137, base: 89 },
            { name: "Haifa", lat: 32.7940, lon: 34.9896, base: 84 },
            { name: "Los Angeles", lat: 34.0522, lon: -118.2437, base: 60 },
            { name: "Miami", lat: 25.7617, lon: -80.1918, base: 56 },
            { name: "Paris", lat: 48.8566, lon: 2.3522, base: 78 },
            { name: "London", lat: 51.5074, lon: -0.1278, base: 70 },
            { name: "Chicago", lat: 41.8781, lon: -87.6298, base: 62 },
            { name: "Buenos Aires", lat: -34.6037, lon: -58.3816, base: 65 }
        ];

        function manualUnlock() {
            if (document.getElementById('gate-key').value.trim() === 'אחד') {
                const gate = document.getElementById('access-gate');
                gate.style.opacity = '0';
                setTimeout(() => { 
                    gate.style.display = 'none'; 
                    map.invalidateSize(); 
                    updateTacticalData();
                    loadBriefcase();
                    setInterval(updateTacticalData, 300000); 
                }, 800);
            }
        }

        async function updateTacticalData() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.jpost.com/rss/rssfeedsfrontpage.aspx')}`);
                const data = await res.json();
                const newsText = data.items.map(i => i.title).join(' ').toUpperCase();
                
                // Update News Ticker with Article Links
                const tickerHtml = data.items.slice(0, 10).map(i => `<a href="${i.link}" target="_blank" class="news-item">[ INTEL: ${i.title.toUpperCase()} ]</a>`).join('');
                document.getElementById('live-news-ticker').innerHTML = tickerHtml + tickerHtml;

                // Risk Sentiment Analysis
                const keywords = ['ATTACK', 'ANTISEMITISM', 'PROTEST', 'IRAN', 'MISSILE', 'HEZBOLLAH', 'UNREST', 'CONFLICT'];
                let boost = 0;
                keywords.forEach(word => { if(newsText.includes(word)) boost += 3; });

                hubMarkers.forEach(m => map.removeLayer(m));
                hubMarkers = [];
                let totalRisk = 0;

                HUBS.forEach(hub => {
                    let risk = Math.min(99, hub.base + boost + Math.floor(Math.random() * 5));
                    totalRisk += risk;
                    dropPin(hub.name, "GLOBAL HUB", hub.lat, hub.lon, risk, true);
                });

                const avgRisk = Math.floor(totalRisk / HUBS.length);
                document.getElementById('threat-bar').style.width = avgRisk + '%';
                document.getElementById('threat-text').innerText = `GLOBAL RISK INDEX: ${avgRisk}% - ${avgRisk > 80 ? 'CRITICAL' : 'ELEVATED'}`;
            } catch (e) { console.error("Signal Lost"); }
        }

        function dropPin(name, type, lat, lon, risk=null, isHub=false) {
            let color = '#ef4444'; // Default Red
            if(risk) {
                // Dynamic Coloring based on Danger %
                color = risk > 85 ? '#ef4444' : (risk > 70 ? '#f59e0b' : '#3b82f6');
            }
            
            const labelText = risk ? `${name} [${risk}%]` : name;
            const icon = L.divIcon({ 
                html: `<div class="pin-blob" style="background:${color}">!</div><div class="pin-label">${labelText}</div>`, 
                className: 'custom-icon' 
            });
            
            const marker = L.marker([lat, lon], {icon}).addTo(map);
            const newsLink = `https://www.google.com/search?q=${encodeURIComponent(name)}+breaking+news&tbm=nws`;
            marker.bindPopup(`
                <div style="color:#000; width:150px;">
                    <b>${name}</b><br>
                    <div style="font-size:11px;color:${color};font-weight:bold;">${risk ? risk+'% DANGER' : type}</div>
                    <a href="${newsLink}" target="_blank" class="intel-link">SITREP NEWS</a>
                </div>
            `);
            
            if(isHub) hubMarkers.push(marker);
        }

        async function submitIntel() {
            const userLabel = document.getElementById('report-loc').value;
            const type = document.getElementById('report-type').value;
            if (!tappedCoords) return;
            
            const lat = tappedCoords.lat; 
            const lon = tappedCoords.lng;
            const finalName = (userLabel || tappedAddress).toUpperCase();

            // Discord Integration
            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        title: `🚨 INTEL ALERT: ${finalName}`,
                        color: 15548997,
                        fields: [
                            { name: "SITREP", value: type, inline: true },
                            { name: "GPS", value: `${lat.toFixed(4)}, ${lon.toFixed(4)}`, inline: true }
                        ],
                        footer: { text: "JSI Tactical Sovereign Monitor" },
                        timestamp: new Date()
                    }]
                })
            });

            saveToBriefcase({ name: finalName, type, lat, lon });
            dropPin(finalName, type, lat, lon);
            map.flyTo([lat, lon], 12);
            closeReport();
            document.getElementById('report-loc').value = "";
        }

        map.on('click', async function(e) {
            tappedCoords = e.latlng;
            document.getElementById('resolved-address').innerText = "LOCKING SECTOR...";
            openReport();
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
                const data = await res.json();
                tappedAddress = data.address.city || data.address.town || data.address.country || "COORDINATE LOCK";
                document.getElementById('resolved-address').innerText = `SECTOR: ${tappedAddress.toUpperCase()}`;
            } catch (err) { tappedAddress = "MARKED POINT"; }
        });

        function locateUser() { map.locate({setView: true, maxZoom: 14, enableHighAccuracy: true}); }
        map.on('locationfound', (e) => {
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(e.latlng, {icon: L.divIcon({className: 'user-pulse', iconSize:[18,18]})}).addTo(map);
        });

        function toggleMapMode() {
            const btn = document.getElementById('day-night-btn');
            if (isDarkMode) {
                map.removeLayer(darkTiles); lightTiles.addTo(map);
                btn.innerHTML = "<span>🌙</span>NIGHT"; btn.style.background = "#ddd"; btn.style.color = "#000"; isDarkMode = false;
            } else {
                map.removeLayer(lightTiles); darkTiles.addTo(map);
                btn.innerHTML = "<span>🌞</span>DAY"; btn.style.background = "#333"; btn.style.color = "#fff"; isDarkMode = true;
            }
        }

        function saveToBriefcase(item) {
            let items = JSON.parse(localStorage.getItem('jsi_case')) || [];
            items.push(item);
            localStorage.setItem('jsi_case', JSON.stringify(items));
            renderBriefcase();
        }

        function loadBriefcase() {
            let items = JSON.parse(localStorage.getItem('jsi_case')) || [];
            items.forEach(i => dropPin(i.name, i.type, i.lat, i.lon));
            renderBriefcase();
        }

        function renderBriefcase() {
            let items = JSON.parse(localStorage.getItem('jsi_case')) || [];
            const list = document.getElementById('case-list');
            list.innerHTML = items.map(i => `<div class="case-entry"><b>${i.name}</b><br><span style="color:#ef4444">${i.type}</span></div>`).join('');
        }

        function clearBriefcase() { localStorage.removeItem('jsi_case'); location.reload(); }
        function toggleBriefcase() { document.getElementById('briefcase-sidebar').classList.toggle('open'); }
        function openReport() { document.getElementById('report-modal').style.display = 'flex'; }
        function closeReport() { document.getElementById('report-modal').style.display = 'none'; }
        
        function shareSite() {
            const msg = `⚠️ JSI TACTICAL MONITOR | LIVE UPLINK\nLink: ${window.location.href}\nPass: אחד`;
            navigator.share ? navigator.share({text: msg}) : alert("Briefing Copied.");
        }
    </script>
</body>
</html>
