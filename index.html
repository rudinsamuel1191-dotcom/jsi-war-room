<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI | War Room Command</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JSI WarRoom">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05070a; margin: 0; font-family: 'Courier New', Courier, monospace; color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #0b0e14; }
        
        .sidebar {
            position: absolute; top: 40px; left: 20px; width: 320px; z-index: 1000;
            background: rgba(11, 14, 20, 0.9); border: 1px solid #374151;
            padding: 20px; border-radius: 8px; backdrop-filter: blur(10px);
        }

        .panic-btn {
            background: #b91c1c; color: white; width: 100%; padding: 15px;
            text-transform: uppercase; font-weight: 900; margin-top: 20px;
            border-radius: 4px; border: 2px solid #ef4444; cursor: pointer;
        }

        /* SLOWED TICKER: Increased time to 90s */
        .ticker-wrap {
            position: absolute; bottom: 0; width: 100%; height: 40px; 
            background-color: rgba(0, 0, 0, 0.9); border-top: 2px solid #ef4444; 
            z-index: 1001; display: flex; align-items: center; overflow: hidden;
        }
        .ticker {
            display: inline-block; white-space: nowrap; animation: ticker 90s linear infinite; 
            font-weight: bold; color: #ef4444; font-size: 14px;
        }
        @keyframes ticker {
            0% { transform: translate3d(100%, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .search-input {
            background: #1f2937; color: white; width: 100%; padding: 10px;
            border: 1px solid #4b5563; border-radius: 4px; margin-top: 10px; font-size: 12px;
        }

        .danger-pin {
            background-color: #ef4444; border: 2px solid #fff; border-radius: 50% 50% 0 50%;
            color: white; font-weight: 800; font-size: 10px; display: flex;
            align-items: center; justify-content: center; transform: rotate(45deg);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.8); animation: pulse 2s infinite;
        }
        .pin-text { transform: rotate(-45deg); }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1 style="color: #ef4444; margin: 0; letter-spacing: 2px; font-size: 22px;">JSI COMMAND</h1>
        <p id="status-time" style="color: #9ca3af; font-size: 10px; margin-bottom: 15px;">SCANNING ACTIVE THREATS...</p>
        
        <div style="border-top: 1px solid #374151; padding-top: 15px;">
            <label style="font-size: 10px; color: #ef4444; font-weight: bold;">INTEL SEARCH</label>
            <input type="text" id="search-box" class="search-input" placeholder="Enter City...">
        </div>

        <button class="panic-btn" onclick="triggerPanic()">⚠️ Signal Emergency</button>
    </div>

    <div class="ticker-wrap">
        <div class="ticker" id="news-ticker">FETCHING GLOBAL INTELLIGENCE DATA... SCANNING FOR HIGH-RISK NODES...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([35, -40], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        function triggerPanic() {
            const emergencyContact = "911"; 
            const message = encodeURIComponent("JSI EMERGENCY: I am in an unsafe zone. Monitor my status via the War Room: " + window.location.href);
            window.location.href = `sms:${emergencyContact}?&body=${message}`;
        }

        // Search Function
        document.getElementById('search-box').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const city = e.target.value;
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.length > 0) {
                            const lat = data[0].lat;
                            const lon = data[0].lon;
                            const risk = Math.floor(Math.random() * 30) + 65; 
                            map.flyTo([lat, lon], 12);
                            addPin(lat, lon, city.toUpperCase(), risk);
                        }
                    });
            }
        });

        function addPin(lat, lon, name, risk) {
            const icon = L.divIcon({ className: 'danger-pin', html: `<span class="pin-text">${risk}%</span>`, iconSize: [35, 35] });
            L.marker([lat, lon], { icon: icon }).addTo(map).bindPopup(`<b style="color:black">${name}: ${risk}% Risk</b>`);
        }

        // AUTO-SCAN ENGINE: Populations pins over 70% automatically
        async function runAutoIntelligence() {
            const targetRegions = [
                { name: "New York", coords: [40.7128, -74.0060] },
                { name: "Los Angeles", coords: [34.0522, -118.2437] },
                { name: "Florida", coords: [27.6648, -81.5158] },
                { name: "London", coords: [51.5074, -0.1278] },
                { name: "Paris", coords: [48.8566, 2.3522] },
                { name: "Berlin", coords: [52.5200, 13.4050] },
                { name: "Chicago", coords: [41.8781, -87.6298] },
                { name: "Toronto", coords: [43.6532, -79.3832] }
            ];

            targetRegions.forEach(region => {
                const risk = Math.floor(Math.random() * 40) + 55; // Generates 55-95%
                if (risk > 70) {
                    addPin(region.coords[0], region.coords[1], region.name.toUpperCase(), risk);
                }
            });
        }

        async function updateFeed() {
            try {
                const response = await fetch('https://ok.surf/api/v1/cors/news-feed');
                const data = await response.json();
                const feeds = data.World.slice(0, 12).map(item => `[BREAKING] ${item.title.toUpperCase()} --- `);
                document.getElementById('news-ticker').innerText = feeds.join(" ");
                document.getElementById('status-time').innerText = "LIVE // " + new Date().toLocaleTimeString();
            } catch (err) {}
        }

        runAutoIntelligence();
        updateFeed();
        setInterval(updateFeed, 300000);
    </script>
</body>
</html>
